name: watch_party
description: Cross-platform IPTV watch-together client.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  watch_party_protocol:
    path: ../shared

  flutter_bloc: ^8.1.0
  bloc: ^8.1.0
  equatable: ^2.0.0

  get_it: ^7.6.0

  signalr_netcore: ^1.3.0
  dio: ^5.4.0

  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_windows_video: ^1.0.11
  media_kit_libs_android_video: ^1.3.8

  connectivity_plus: ^6.0.0
  logger: ^2.2.0
  path_provider: ^2.1.0
  window_manager: ^0.5.1
  google_fonts: ^8.0.2
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^9.1.0
  mocktail: ^1.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/config/appsettings.local.json

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48
