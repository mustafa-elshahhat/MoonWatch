name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore server/WatchParty.slnx

    - name: Build
      run: dotnet build server/WatchParty.slnx -c Release --no-restore

    - name: Test
      run: dotnet test server/WatchParty.slnx -c Release --no-build

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'

    - name: Flutter Dependencies
      run: cd client && flutter pub get

    - name: Flutter Analyze
      run: cd client && flutter analyze

    - name: Flutter Test
      run: cd client && flutter test
