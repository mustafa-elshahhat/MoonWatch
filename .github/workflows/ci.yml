name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore server/WatchParty.slnx

    - name: Build
      run: dotnet build server/WatchParty.slnx -c Release --no-restore

    - name: Test
      run: dotnet test server/WatchParty.slnx -c Release --no-build --filter "Category!=Performance&Category!=Benchmark"

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'

    - name: Flutter Dependencies
      run: cd client && flutter pub get

    - name: Flutter Analyze
      run: cd client && flutter analyze

    - name: Flutter Format Check
      run: cd client && dart format --set-exit-if-changed lib test

    - name: Flutter Test
      run: cd client && flutter test

    - name: Shared Dart Pub Get
      run: cd shared && dart pub get

    - name: Shared Format Check
      run: cd shared && dart format --set-exit-if-changed lib test

    - name: Shared Analyze
      run: cd shared && dart analyze

    - name: Shared Test
      run: cd shared && dart test

  samsung-tv:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: client_samsung_tv/package-lock.json

    - name: Install dependencies
      run: cd client_samsung_tv && npm ci

    - name: Protocol drift check
      run: cd client_samsung_tv && npm run check:protocol

    - name: Typecheck
      run: cd client_samsung_tv && npm run typecheck

    - name: Unit tests
      run: cd client_samsung_tv && npm test

    - name: Build
      run: cd client_samsung_tv && npm run build

    # Dev-server-only advisories (e.g. esbuild GHSA-g7r4-m6w7-qqqr) do not affect
    # the shipped Tizen bundle; high+ severity should still fail the build.
    - name: Audit (high+)
      run: cd client_samsung_tv && npm audit --audit-level=high
